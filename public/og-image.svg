<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1121"/>
      <stop offset="100%" stop-color="#16204A"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="150" r="250" fill="rgba(59,130,246,0.12)"/>
  <circle cx="1050" cy="500" r="200" fill="rgba(129,140,248,0.08)"/>
  
  <!-- Header bar -->
  <rect x="40" y="30" width="1120" height="50" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="56" y="42" width="26" height="26" rx="6" fill="url(#acc)"/>
  <text x="69" y="61" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">S</text>
  <text x="92" y="61" font-family="Arial,sans-serif" font-size="18" font-weight="800" fill="#f1f5f9">SkyVisible</text>
  <text x="1100" y="61" font-family="Arial,sans-serif" font-size="12" fill="#64748b" text-anchor="end">www.skyvisible.com</text>

  <!-- LEFT: Headlines -->
  <text x="60" y="180" font-family="Arial,sans-serif" font-size="40" font-weight="700" fill="#f8fafc">اپنے کاروبار کو</text>
  <text x="60" y="230" font-family="Arial,sans-serif" font-size="44" font-weight="800" fill="url(#acc)">لوکل SEO میں #1 بنائیں</text>
  <text x="60" y="280" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" line-height="1.8">Google Search اور Google Maps پر نمائیاں بنیں — زیادہ کالز، زیادہ کسٹمرز</text>

  <!-- LEFT: Benefit chips with proper spacing -->
  <rect x="60" y="320" width="140" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="130" y="340" font-family="Arial,sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">📞 زیادہ کالز</text>
  
  <rect x="210" y="320" width="150" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="285" y="340" font-family="Arial,sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">📍 بہتر رینکنگ</text>
  
  <rect x="370" y="320" width="140" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="440" y="340" font-family="Arial,sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">⭐ اعتماد</text>
  
  <rect x="60" y="360" width="160" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="140" y="380" font-family="Arial,sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">📈 زیادہ گاہک</text>

  <!-- CTA button -->
  <rect x="60" y="420" width="220" height="48" rx="24" fill="#3B82F6"/>
  <text x="170" y="450" font-family="Arial,sans-serif" font-size="15" fill="#fff" text-anchor="middle" font-weight="bold">🚀 مفت مشورہ</text>

  <!-- RIGHT: Google Business Profile Card -->
  <g transform="translate(660, 80)">
    <rect x="0" y="0" width="460" height="460" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    
    <!-- Window header -->
    <rect x="0" y="0" width="460" height="36" rx="16" fill="rgba(0,0,0,0.25)"/>
    <rect x="0" y="20" width="460" height="16" fill="rgba(0,0,0,0.25)"/>
    <circle cx="18" cy="18" r="4.5" fill="#EF4444"/>
    <circle cx="32" cy="18" r="4.5" fill="#F59E0B"/>
    <circle cx="46" cy="18" r="4.5" fill="#34D399"/>
    <text x="230" y="23" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Google Business Profile</text>

    <!-- Profile -->
    <circle cx="65" cy="80" r="24" fill="#3B82F6"/>
    <text x="65" y="87" font-family="Arial,sans-serif" font-size="18" fill="#fff" text-anchor="middle">S</text>
    <text x="100" y="76" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#f1f5f9">SkyVisible</text>
    <text x="100" y="96" font-family="Arial,sans-serif" font-size="12" fill="#64748b">دجیٹل مارکٹنگ ایجنسی</text>

    <!-- Stars -->
    <line x1="40" y1="120" x2="420" y2="120" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="60" y="148" font-family="Arial,sans-serif" font-size="18" fill="#F59E0B">★ ★ ★ ★ ★</text>
    <text x="220" y="148" font-family="Arial,sans-serif" font-size="13" fill="#cbd5e1">١٢٨+ آرائے</text>

    <!-- Stats row -->
    <line x1="40" y1="170" x2="420" y2="170" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="70" y="200" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#34D399">١٥٠+</text>
    <text x="70" y="220" font-family="Arial,sans-serif" font-size="11" fill="#64748b">کلائنٹس</text>
    <text x="180" y="200" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#60A5FA">٣×</text>
    <text x="180" y="220" font-family="Arial,sans-serif" font-size="11" fill="#64748b">ترقی</text>
    <text x="290" y="200" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#F59E0B">٥★</text>
    <text x="290" y="220" font-family="Arial,sans-serif" font-size="11" fill="#64748b">درجہ</text>

    <!-- Mockup content lines -->
    <line x1="40" y1="250" x2="420" y2="250" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="40" y="270" width="200" height="7" rx="3.5" fill="rgba(255,255,255,0.08)"/>
    <rect x="40" y="286" width="310" height="7" rx="3.5" fill="rgba(255,255,255,0.05)"/>
    <rect x="40" y="302" width="250" height="7" rx="3.5" fill="rgba(255,255,255,0.05)"/>

    <!-- Verified badge -->
    <rect x="40" y="330" width="200" height="28" rx="14" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
    <text x="65" y="349" font-family="Arial,sans-serif" font-size="12" fill="#34D399">✔ نقشے پر نمائیاں</text>

    <!-- Team avatars -->
    <line x1="40" y1="380" x2="420" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="60" cy="415" r="15" fill="#60A5FA"/>
    <text x="60" y="420" font-family="Arial,sans-serif" font-size="11" fill="#fff" text-anchor="middle">👩</text>
    <circle cx="80" cy="415" r="15" fill="#818CF8"/>
    <text x="80" y="420" font-family="Arial,sans-serif" font-size="11" fill="#fff" text-anchor="middle">👩</text>
    <circle cx="100" cy="415" r="15" fill="#A78BFA"/>
    <text x="100" y="420" font-family="Arial,sans-serif" font-size="11" fill="#fff" text-anchor="middle">👩</text>
    <text x="130" y="420" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Female Developers Available</text>
  </g>
</svg>